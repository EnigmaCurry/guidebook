depends_on:
  - release

when:
  - event: tag
    ref: refs/tags/v*

steps:
  - name: download
    image: alpine
    environment:
      FORGEJO_TOKEN:
        from_secret: forgejo_token
    commands:
      - apk add --no-cache curl
      - mkdir -p dist
      - |
        for arch in amd64 arm64; do
          curl -fSL -H "Authorization: token $FORGEJO_TOKEN" \
            "${CI_FORGE_URL}/${CI_REPO}/releases/download/${CI_COMMIT_TAG}/guidebook-linux-${arch}" \
            -o dist/guidebook-linux-${arch}
        done

  - name: docker
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      dockerfile: Dockerfile.release
      repo: ${CI_FORGE_URL##https://}/${CI_REPO}
      registry: ${CI_FORGE_URL##https://}
      username:
        from_secret: forgejo_user
      password:
        from_secret: forgejo_token
      platforms:
        - linux/amd64
        - linux/arm64
      tag:
        - ${CI_COMMIT_TAG##v}
        - latest
